<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>음악 아티스트 지원사업 대시보드</title>
  <style>
    /* ── 전체 레이아웃 ── */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0f0f0f;
      color: #f0f0f0;
      font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
      min-height: 100vh;
      padding: 32px 16px 64px;
    }

    /* ── 헤더 ── */
    header {
      max-width: 860px;
      margin: 0 auto 36px;
    }

    header h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    header p.subtitle {
      font-size: 13px;
      color: #888;
    }

    /* ── 요약 바 (총 몇 건, 마지막 업데이트) ── */
    .summary-bar {
      max-width: 860px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .badge {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      color: #aaa;
    }

    .badge span {
      color: #fff;
      font-weight: 600;
    }

    /* ── 카드 목록 ── */
    .card-list {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── 카드 ── */
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 20px 24px;
      transition: border-color 0.15s;
    }

    .card:hover {
      border-color: #444;
    }

    /* 마감 임박 카드는 왼쪽에 빨간 줄 */
    .card.urgent {
      border-left: 3px solid #e74c3c;
    }

    /* ── 카드 상단 행 (사업명 + 마감 배지) ── */
    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .card-top h2 {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.4;
      flex: 1;
      min-width: 200px;
    }

    /* 마감일 배지 */
    .deadline-badge {
      white-space: nowrap;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      background: #2a2a2a;
      color: #aaa;
    }

    .deadline-badge.urgent {
      background: rgba(231, 76, 60, 0.15);
      color: #e74c3c;
    }

    /* ── 카드 세부 정보 행 ── */
    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 24px;
      margin-bottom: 14px;
    }

    .meta-item {
      font-size: 13px;
      color: #999;
    }

    .meta-item .label {
      color: #666;
      margin-right: 4px;
    }

    .meta-item .value {
      color: #ddd;
    }

    /* 지원금액은 강조 */
    .meta-item.amount .value {
      color: #7ec8e3;
      font-weight: 600;
    }

    /* ── 지원 대상 ── */
    .card-target {
      font-size: 12px;
      color: #777;
      line-height: 1.6;
      margin-bottom: 10px;
      padding: 10px 12px;
      background: #111;
      border-radius: 8px;
    }

    /* ── 구조화 요약 박스 ── */
    .card-summary {
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card-summary.empty {
      display: none;
    }

    .summary-row {
      display: flex;
      gap: 10px;
      font-size: 13px;
      line-height: 1.6;
      padding: 8px 12px;
      border-radius: 7px;
    }

    /* 지원 조건 — 파란 계열 */
    .summary-row.condition {
      background: rgba(100, 160, 255, 0.07);
      border: 1px solid rgba(100, 160, 255, 0.15);
    }

    /* 지원 내용 — 초록 계열 */
    .summary-row.benefit {
      background: rgba(80, 200, 140, 0.07);
      border: 1px solid rgba(80, 200, 140, 0.15);
    }

    .summary-label {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3px;
      padding: 2px 7px;
      border-radius: 4px;
      align-self: flex-start;
      margin-top: 1px;
      white-space: nowrap;
    }

    .summary-row.condition .summary-label {
      background: rgba(100, 160, 255, 0.2);
      color: #7eb8ff;
    }

    .summary-row.benefit .summary-label {
      background: rgba(80, 200, 140, 0.2);
      color: #5ed8a0;
    }

    .summary-text {
      color: #ccc;
    }

    /* ── 공식 링크 버튼 ── */
    .btn-link {
      display: inline-block;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 8px;
      background: #222;
      color: #f0f0f0;
      text-decoration: none;
      border: 1px solid #333;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-link:hover {
      background: #2e2e2e;
      border-color: #555;
    }

    /* ── 마지막 업데이트 안내 ── */
    footer {
      max-width: 860px;
      margin: 40px auto 0;
      text-align: center;
      font-size: 12px;
      color: #555;
      line-height: 1.8;
    }

    /* ── 데이터 없을 때 ── */
    .empty-state {
      max-width: 860px;
      margin: 60px auto;
      text-align: center;
      color: #555;
    }

    /* ── 에러 메시지 ── */
    .error-box {
      max-width: 860px;
      margin: 40px auto;
      padding: 20px;
      background: rgba(231, 76, 60, 0.1);
      border: 1px solid #e74c3c;
      border-radius: 10px;
      color: #e74c3c;
      font-size: 14px;
      line-height: 1.7;
    }
  </style>
</head>
<body>

  <header>
    <h1>음악 아티스트 지원사업 대시보드</h1>
    <p class="subtitle">국내 음악인을 위한 창작 지원금 · 공연 지원 모음</p>
  </header>

  <!-- 요약 바: 자바스크립트가 채워줌 -->
  <div class="summary-bar" id="summary-bar"></div>

  <!-- 카드 목록: 자바스크립트가 채워줌 -->
  <div class="card-list" id="card-list">
    <p style="text-align:center; color:#555; margin-top:60px;">불러오는 중...</p>
  </div>

  <footer id="footer"></footer>

  <script>
    // ──────────────────────────────────────────────
    // programs.json을 읽어서 카드를 동적으로 생성하는 스크립트
    // ──────────────────────────────────────────────

    // 날짜 문자열을 보기 좋게 포맷 (예: "2026-04-10" → "4월 10일")
    function formatDeadline(deadline) {
      // "상시 신청", "2026년 상반기" 같은 텍스트는 그대로 반환
      if (!deadline.match(/^\d{4}-\d{2}-\d{2}$/)) {
        return deadline;
      }
      const date = new Date(deadline);
      const month = date.getMonth() + 1;
      const day = date.getDate();
      return `${month}월 ${day}일`;
    }

    // 마감일이 7일 이내인지 확인 (urgent 표시용)
    function isUrgent(deadline) {
      if (!deadline.match(/^\d{4}-\d{2}-\d{2}$/)) return false;
      const now = new Date();
      const deadlineDate = new Date(deadline);
      const diffDays = (deadlineDate - now) / (1000 * 60 * 60 * 24);
      return diffDays >= 0 && diffDays <= 7;
    }

    // 구조화 요약 HTML 생성
    function buildSummaryHtml(summary) {
      // summary가 없거나 빈 객체면 숨김
      if (!summary || typeof summary !== "object") return '<div class="card-summary empty"></div>';
      const 조건 = summary["조건"] || "";
      const 내용 = summary["내용"] || "";
      if (!조건 && !내용) return '<div class="card-summary empty"></div>';

      let html = '<div class="card-summary">';
      if (조건) {
        html += `<div class="summary-row condition">
          <span class="summary-label">지원 조건</span>
          <span class="summary-text">${조건}</span>
        </div>`;
      }
      if (내용) {
        html += `<div class="summary-row benefit">
          <span class="summary-label">지원 내용</span>
          <span class="summary-text">${내용}</span>
        </div>`;
      }
      html += "</div>";
      return html;
    }

    // 마감일 기준으로 정렬 (날짜 형식은 앞으로, 텍스트 형식은 뒤로)
    function sortByDeadline(programs) {
      return programs.slice().sort((a, b) => {
        const aIsDate = a.deadline.match(/^\d{4}-\d{2}-\d{2}$/);
        const bIsDate = b.deadline.match(/^\d{4}-\d{2}-\d{2}$/);

        // 둘 다 날짜 형식이면 날짜 순서대로
        if (aIsDate && bIsDate) {
          return new Date(a.deadline) - new Date(b.deadline);
        }
        // 날짜 형식만 앞으로
        if (aIsDate) return -1;
        if (bIsDate) return 1;
        return 0;
      });
    }

    // 카드 HTML 한 개를 만들어서 반환
    function createCard(program) {
      const urgent = program.urgent || isUrgent(program.deadline);
      const deadlineText = formatDeadline(program.deadline);

      const card = document.createElement('div');
      card.className = urgent ? 'card urgent' : 'card';

      card.innerHTML = `
        <div class="card-top">
          <h2>${program.name}</h2>
          <span class="deadline-badge ${urgent ? 'urgent' : ''}">
            ${urgent ? '⚠ 마감 임박 · ' : ''}${deadlineText}
          </span>
        </div>
        <div class="card-meta">
          <div class="meta-item">
            <span class="label">기관</span>
            <span class="value">${program.organization}</span>
          </div>
          <div class="meta-item amount">
            <span class="label">지원금액</span>
            <span class="value">${program.amount}</span>
          </div>
        </div>
        <div class="card-target">${program.target}</div>
        ${buildSummaryHtml(program.summary)}
        <a class="btn-link" href="${program.url}" target="_blank" rel="noopener">
          공식 페이지 열기 →
        </a>
      `;

      return card;
    }

    // programs.json을 불러와서 화면을 구성하는 메인 함수
    async function loadPrograms() {
      const cardList = document.getElementById('card-list');
      const summaryBar = document.getElementById('summary-bar');
      const footer = document.getElementById('footer');

      try {
        // programs.json을 같은 폴더에서 읽어옴
        const response = await fetch('./programs.json');

        // 파일을 못 읽으면 에러 처리
        if (!response.ok) {
          throw new Error(`programs.json을 불러올 수 없습니다. (상태 코드: ${response.status})`);
        }

        const data = await response.json();
        const programs = data.programs || [];

        // 마감일 순으로 정렬
        const sorted = sortByDeadline(programs);

        // 카드 목록 초기화 후 카드 추가
        cardList.innerHTML = '';

        if (sorted.length === 0) {
          cardList.innerHTML = '<div class="empty-state">현재 등록된 지원사업이 없습니다.</div>';
        } else {
          sorted.forEach(program => {
            cardList.appendChild(createCard(program));
          });
        }

        // 요약 바 업데이트
        const urgentCount = sorted.filter(p => p.urgent || isUrgent(p.deadline)).length;
        summaryBar.innerHTML = `
          <div class="badge">총 <span>${sorted.length}건</span></div>
          ${urgentCount > 0 ? `<div class="badge" style="border-color:#e74c3c; color:#e74c3c;">마감 임박 <span style="color:#e74c3c">${urgentCount}건</span></div>` : ''}
          <div class="badge">마지막 업데이트: <span>${data.updated_at || '알 수 없음'}</span></div>
        `;

        // 푸터 업데이트
        footer.innerHTML = `
          각 사업의 정확한 마감일·지원 조건은 공식 공고문에서 반드시 확인하세요.<br>
          데이터 출처: GROUNZ, 한국문화예술위원회, 서울문화재단, 한국예술인복지재단
        `;

      } catch (error) {
        // fetch는 로컬 파일(file://) 에서는 CORS 오류가 발생함
        // 이 경우 사용자에게 해결 방법을 안내
        cardList.innerHTML = `
          <div class="error-box">
            <strong>데이터를 불러올 수 없습니다.</strong><br><br>
            브라우저에서 직접 파일을 열면 보안 제한으로 JSON을 읽지 못합니다.<br>
            아래 방법 중 하나를 사용해주세요:<br><br>
            <strong>방법 1 (권장)</strong> — 터미널에서 아래 명령어 실행:<br>
            <code style="background:#111; padding:4px 8px; border-radius:4px; font-family:monospace;">
              cd ~/music-support-dashboard && python3 -m http.server 8080
            </code><br>
            그 다음 브라우저에서 <code>http://localhost:8080</code> 열기<br><br>
            <strong>방법 2</strong> — VS Code에서 "Live Server" 확장 설치 후 index.html 우클릭 → Open with Live Server
          </div>
        `;
      }
    }

    // 페이지가 로드되면 실행
    loadPrograms();
  </script>

</body>
</html>
